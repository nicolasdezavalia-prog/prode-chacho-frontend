<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prode Chacho</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!--
      Polyfill de banderas de países (Twemoji) para sistemas que no las renderizan
      nativamente (Windows principalmente). El @font-face usa unicode-range para
      aplicarse SOLO al rango de regional indicators (U+1F1E6-1F1FF) y a flags
      compuestas (U+1F3F4 + tags). El resto del contenido sigue usando Inter/
      Segoe UI sin cambios.

      Si el CDN falla:
        - La fuente no carga.
        - Los flags vuelven al fallback nativo del OS (en Windows quedan como
          letras "CZ", "KR", etc., comportamiento previo).
        - La app sigue funcionando sin error.

      Selector `html body` con especificidad (0,0,0,2) para ganarle a la regla
      `body { font-family: var(--font) }` de main.css (especificidad (0,0,0,1)),
      independiente del orden de carga.
    -->
    <style>
      @font-face {
        font-family: 'Twemoji Country Flags';
        unicode-range: U+1F1E6-1F1FF, U+1F3F4, U+E0062-E0063, U+E0065, U+E0067, U+E006C, U+E006E, U+E0073-E0074, U+E0077, U+E007F;
        src: url('https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1/dist/TwemojiCountryFlags.woff2') format('woff2');
        font-display: swap;
      }
      html body {
        font-family: 'Twemoji Country Flags', 'Inter', 'Segoe UI', system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
